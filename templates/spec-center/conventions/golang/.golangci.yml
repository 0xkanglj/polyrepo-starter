version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck      # unchecked errors
    - govet         # vet suspicious code
    - staticcheck   # advanced static analysis
    - unused        # unused code
    - ineffassign   # ineffectual assignments

    - bodyclose     # HTTP response body close checks
    - nilnil        # checks for `return nil, nil`
    - gocritic      # opinionated style checks
    - gosec         # security issues
    - misspell      # typos in comments/strings
    - goconst       # repeated strings that should be constants
    - gocyclo       # cyclomatic complexity
    - unconvert     # redundant type conversions
    - errorlint     # error handling best practices
    - revive        # drop-in golint replacement

  settings:
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unused-parameter
        - name: unused-receiver
        - name: indent-error-flow
    misspell:
      locale: US

  exclusions:
    rules:
      - path: (.+)_test\.go
        linters:
          - errcheck
          - gosec
          - goconst
          - gocritic
    paths:
      - internal/dbsqlc/  # generated by sqlc

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - goimports
